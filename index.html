<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ニュース接触タイプ診断</title>
<meta name="description" content="5つの質問に答えて、あなたのニュースとの付き合い方を動物キャラクターで診断。情報との接し方や習慣のヒントもわかる診断コンテンツ。" />
<style>
:root {
  --bg-1: #07111f;
  --bg-2: #0f1d33;
  --bg-3: #152a47;
  --panel: rgba(255, 255, 255, 0.9);
  --panel-strong: rgba(255, 255, 255, 0.97);
  --text: #172033;
  --sub: #61708d;
  --line: rgba(71, 102, 153, 0.18);
  --accent: #4f8cff;
  --accent-2: #7c5cff;
  --accent-soft: rgba(79, 140, 255, 0.12);
  --success: #19b37d;
  --warm-1: #fff8dc;
  --warm-2: #ffe9a8;
  --warm-3: #f7c948;
  --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.18);
  --shadow-md: 0 10px 30px rgba(20, 30, 60, 0.12);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --maxw: 920px;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  color: #fff;
  font-family:
    Inter, "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN",
    "Yu Gothic UI", "Segoe UI", system-ui, -apple-system, sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(124,92,255,.18), transparent 28%),
    radial-gradient(circle at 90% 20%, rgba(79,140,255,.18), transparent 24%),
    radial-gradient(circle at 50% 100%, rgba(25,179,125,.10), transparent 30%),
    linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,.85), rgba(0,0,0,.2));
}

.shell {
  width: min(calc(100% - 24px), var(--maxw));
  margin: 0 auto;
  padding: 24px 0 48px;
  position: relative;
  z-index: 1;
}

.hero {
  position: relative;
  overflow: hidden;
  padding: 28px;
  border-radius: 32px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.07));
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(18px);
  margin-bottom: 20px;
}

.hero::before,
.hero::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(10px);
  opacity: .55;
}

.hero::before {
  width: 260px;
  height: 260px;
  right: -70px;
  top: -100px;
  background: radial-gradient(circle, rgba(79,140,255,.42), transparent 70%);
}

.hero::after {
  width: 220px;
  height: 220px;
  left: -70px;
  bottom: -110px;
  background: radial-gradient(circle, rgba(247,201,72,.24), transparent 70%);
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.15);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .04em;
  backdrop-filter: blur(8px);
}

.hero-title {
  margin: 18px 0 12px;
  font-size: clamp(30px, 6vw, 54px);
  line-height: 1.08;
  font-weight: 900;
  letter-spacing: -.03em;
  max-width: 11ch;
}

.hero-sub {
  max-width: 700px;
  color: rgba(255,255,255,.82);
  font-size: clamp(15px, 2.2vw, 18px);
  line-height: 1.8;
  margin: 0;
}

.hero-mini {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 22px;
}

.hero-mini-item {
  padding: 14px 16px;
  border-radius: 18px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.10);
}

.hero-mini-num {
  display: block;
  font-size: 13px;
  color: rgba(255,255,255,.65);
  margin-bottom: 4px;
}

.hero-mini-text {
  font-size: 14px;
  font-weight: 700;
}

.surface {
  background: var(--panel);
  border: 1px solid rgba(255,255,255,.45);
  box-shadow: var(--shadow-md);
  color: var(--text);
  border-radius: var(--radius-xl);
  backdrop-filter: blur(14px);
}

.quiz-surface,
.result-surface {
  overflow: hidden;
}

.quiz-surface {
  min-height: 420px;
}

.quiz-inner,
.result-inner {
  padding: 22px;
}

.progress-wrap {
  margin-bottom: 18px;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.progress-label {
  font-size: 13px;
  color: var(--sub);
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.progress-count {
  font-size: 14px;
  color: var(--sub);
  font-weight: 800;
}

.progress-steps {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.step-pill {
  position: relative;
  height: 12px;
  border-radius: 999px;
  background: #e6ebf5;
  overflow: hidden;
}

.step-pill.active {
  background: linear-gradient(90deg, rgba(79,140,255,.18), rgba(124,92,255,.18));
  box-shadow: inset 0 0 0 1px rgba(79,140,255,.14);
}

.step-pill.done::before,
.step-pill.active::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
}

.progress-bar {
  height: 14px;
  border-radius: 999px;
  background: #ebf0f7;
  overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,.06);
}

.progress-fill {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  box-shadow: 0 8px 20px rgba(79,140,255,.28);
  transition: width .35s ease;
}

.question-card {
  position: relative;
  overflow: hidden;
  border-radius: 24px;
  padding: 22px;
  background:
    radial-gradient(circle at top right, rgba(79,140,255,.08), transparent 28%),
    linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
  border: 1px solid #e9eef7;
  min-height: 280px;
}

.question-kicker {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 14px;
}

.question-title {
  font-size: clamp(22px, 4vw, 34px);
  line-height: 1.35;
  font-weight: 900;
  margin: 0 0 18px;
  letter-spacing: -.02em;
}

.answers {
  display: grid;
  gap: 14px;
}

.answer-btn {
  appearance: none;
  border: 1px solid #dde5f2;
  background: rgba(255,255,255,.92);
  color: var(--text);
  border-radius: 20px;
  padding: 18px;
  text-align: left;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(20, 30, 60, .05);
  transition:
    transform .18s ease,
    border-color .18s ease,
    box-shadow .18s ease,
    background .18s ease;
}

.answer-btn:hover {
  transform: translateY(-2px);
  border-color: rgba(79,140,255,.45);
  box-shadow: 0 16px 26px rgba(79,140,255,.12);
  background: #fbfdff;
}

.answer-btn:active {
  transform: translateY(0);
}

.answer-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.answer-num {
  width: 34px;
  min-width: 34px;
  height: 34px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #edf4ff, #e9ecff);
  color: var(--accent);
  font-size: 15px;
  font-weight: 900;
  box-shadow: inset 0 0 0 1px rgba(79,140,255,.08);
}

.answer-title {
  font-size: 17px;
  font-weight: 800;
  line-height: 1.5;
}

.answer-sub {
  color: var(--sub);
  font-size: 14px;
  line-height: 1.7;
  padding-left: 46px;
}

.nav-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 18px;
}

.btn {
  appearance: none;
  border: none;
  border-radius: 16px;
  padding: 14px 18px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: transform .16s ease, opacity .16s ease, box-shadow .16s ease, background .16s ease;
}

.btn:hover {
  transform: translateY(-1px);
}

.btn:disabled {
  opacity: .45;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: #eef3fa;
  color: #40526f;
}

.btn-secondary:hover {
  background: #e7eef8;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
  box-shadow: 0 12px 24px rgba(79,140,255,.24);
}

.btn-dark {
  background: #121c2f;
  color: #fff;
}

.quiz-enter {
  animation: fadeSlideIn .35s ease;
}

.result-surface {
  margin-top: 18px;
}

.result-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.section-title {
  margin: 0;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -.02em;
}

.section-sub {
  margin: 6px 0 0;
  color: var(--sub);
  font-size: 14px;
}

.result-card {
  position: relative;
  overflow: hidden;
  border-radius: 28px;
  padding: 24px;
  background:
    radial-gradient(circle at 85% 15%, rgba(255,255,255,.55), transparent 22%),
    radial-gradient(circle at 15% 90%, rgba(255,255,255,.2), transparent 26%),
    linear-gradient(145deg, var(--warm-1) 0%, var(--warm-2) 60%, #ffd977 100%);
  border: 1px solid rgba(247, 201, 72, .65);
  box-shadow:
    0 24px 50px rgba(111, 87, 18, .18),
    inset 0 0 0 1px rgba(255,255,255,.28);
  color: #513a00;
}

.result-card::before {
  content: "";
  position: absolute;
  inset: auto -30px -38px auto;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.34), transparent 70%);
}

.result-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: rgba(255,255,255,.72);
  border: 1px solid rgba(120,92,0,.08);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 900;
  margin-bottom: 14px;
  position: relative;
  z-index: 1;
}

.result-main {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 18px;
  align-items: center;
  position: relative;
  z-index: 1;
}

.result-emoji-wrap {
  display: grid;
  place-items: center;
}

.result-emoji {
  width: 120px;
  height: 120px;
  border-radius: 30px;
  display: grid;
  place-items: center;
  background:
    linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,.34));
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.4),
    0 12px 24px rgba(120, 92, 0, .14);
  font-size: 64px;
}

.result-name {
  font-size: clamp(24px, 4vw, 38px);
  line-height: 1.2;
  font-weight: 900;
  letter-spacing: -.03em;
  margin: 0 0 10px;
}

.result-desc {
  margin: 0;
  color: rgba(81,58,0,.86);
  font-size: 15px;
  line-height: 1.8;
}

.result-meta {
  margin-top: 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  position: relative;
  z-index: 1;
}

.meta-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,.64);
  border: 1px solid rgba(120,92,0,.08);
  font-size: 13px;
  font-weight: 800;
}

.result-grid {
  margin-top: 18px;
  display: grid;
  grid-template-columns: 1.1fr .9fr;
  gap: 16px;
}

.info-card {
  background: var(--panel-strong);
  border: 1px solid #ebeff7;
  border-radius: 22px;
  padding: 18px;
  box-shadow: 0 10px 28px rgba(20, 30, 60, .06);
}

.info-card-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 14px;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -.01em;
}

.info-icon {
  width: 34px;
  height: 34px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 18px;
}

.advice-list {
  margin: 0;
  padding-left: 1.2em;
  color: #334159;
}

.advice-list li + li {
  margin-top: 10px;
}

.advice-list li::marker {
  color: var(--accent);
}

.article-link {
  display: block;
  text-decoration: none;
  color: inherit;
  border-radius: 20px;
  background:
    linear-gradient(180deg, #f8fbff, #f2f7ff);
  border: 1px solid #dde8fb;
  padding: 16px;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}

.article-link:hover {
  transform: translateY(-2px);
  border-color: rgba(79,140,255,.34);
  box-shadow: 0 12px 24px rgba(79,140,255,.10);
}

.article-kicker {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 999px;
  background: #eaf2ff;
  color: var(--accent);
  font-size: 12px;
  font-weight: 900;
  margin-bottom: 10px;
}

.article-title {
  font-size: 17px;
  line-height: 1.6;
  font-weight: 900;
  color: #1d2b46;
  margin: 0 0 8px;
}

.article-note {
  color: var(--sub);
  font-size: 14px;
  line-height: 1.7;
}

.share-panel {
  margin-top: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.small-note {
  color: var(--sub);
  font-size: 13px;
  margin-top: 12px;
}

.footer-actions {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 18px;
}

.hidden {
  display: none !important;
}

@keyframes fadeSlideIn {
  from {
    opacity: 0;
    transform: translateY(14px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes popIn {
  from {
    opacity: 0;
    transform: scale(.96) translateY(8px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.pop-in {
  animation: popIn .35s ease;
}

@media (max-width: 820px) {
  .hero-mini {
    grid-template-columns: 1fr;
  }

  .result-grid {
    grid-template-columns: 1fr;
  }

  .result-main {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .result-meta {
    justify-content: center;
  }
}

@media (max-width: 640px) {
  .shell {
    width: min(calc(100% - 16px), var(--maxw));
    padding: 14px 0 32px;
  }

  .hero {
    padding: 20px;
    border-radius: 24px;
  }

  .hero-title {
    max-width: none;
  }

  .quiz-inner,
  .result-inner {
    padding: 14px;
  }

  .question-card {
    padding: 16px;
    border-radius: 20px;
  }

  .answer-btn {
    padding: 15px;
    border-radius: 16px;
  }

  .answer-title {
    font-size: 16px;
  }

  .answer-sub {
    padding-left: 0;
    margin-top: 6px;
  }

  .answer-top {
    align-items: flex-start;
  }

  .nav-row,
  .footer-actions {
    flex-direction: column;
  }

  .btn {
    width: 100%;
  }

  .result-card {
    padding: 18px;
    border-radius: 22px;
  }

  .result-emoji {
    width: 96px;
    height: 96px;
    border-radius: 24px;
    font-size: 52px;
  }

  .info-card {
    padding: 15px;
    border-radius: 18px;
  }

  .section-title {
    font-size: 22px;
  }
}
</style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-badge">🧭 5問でわかるニュース接触タイプ診断</div>
      <h1 class="hero-title">あなたは情報収集型？<br>共感拡散型？<br>それとも沼型？</h1>
      <p class="hero-sub">
        5つの質問に答えるだけで、ニュースとの付き合い方を動物キャラクターで診断。
        結果ではタイプ説明だけでなく、情報の接し方や習慣についてのアドバイスも表示されます。
      </p>

      <div class="hero-mini">
        <div class="hero-mini-item">
          <span class="hero-mini-num">01</span>
          <div class="hero-mini-text">5問・1分で完了</div>
        </div>
        <div class="hero-mini-item">
          <span class="hero-mini-num">02</span>
          <div class="hero-mini-text">32タイプの動物診断</div>
        </div>
        <div class="hero-mini-item">
          <span class="hero-mini-num">03</span>
          <div class="hero-mini-text">記事おすすめとXシェア付き</div>
        </div>
      </div>
    </section>

    <section id="quizArea" class="surface quiz-surface">
      <div id="quiz" class="quiz-inner"></div>
    </section>

    <section id="resultArea" class="surface result-surface hidden">
      <div class="result-inner">
        <div class="result-header">
          <div>
            <h2 class="section-title">診断結果</h2>
            <p class="section-sub">あなたのニュースとの付き合い方を、動物キャラクターで表すとこうなります。</p>
          </div>
        </div>

        <div id="resultCard" class="result-card"></div>

        <div class="result-grid">
          <div class="info-card">
            <h3 class="info-card-title"><span class="info-icon">📝</span>あなたへのアドバイス</h3>
            <ul id="adviceList" class="advice-list"></ul>
          </div>

          <div class="info-card">
            <h3 class="info-card-title"><span class="info-icon">📚</span>おすすめ記事</h3>
            <a id="articleLink" class="article-link" href="#" target="_blank" rel="noopener noreferrer">
              <div class="article-kicker">おすすめ記事</div>
              <div id="articleTitle" class="article-title"></div>
              <div id="articleNote" class="article-note"></div>
            </a>
          </div>
        </div>

        <div class="share-panel">
          <button id="shareXBtn" class="btn btn-dark" type="button">Xでシェアする</button>
          <button id="copyResultBtn" class="btn btn-secondary" type="button">結果文をコピー</button>
        </div>
        <div class="small-note">※ シェア文には診断結果と診断ページURLが入ります。</div>

        <div class="footer-actions">
          <button id="restartBtn" class="btn btn-primary" type="button">もう一度診断する</button>
        </div>
      </div>
    </section>
  </main>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const QUESTIONS = [
    {
      text: "Q1. 新しいニュースを知るとき、あなたのスタイルに近いのは？",
      answers: [
        {
          title: "自分で探しに行く",
          sub: "キーワード検索やニュースアプリの巡回で、自分から情報を取りに行くことが多い"
        },
        {
          title: "自然に流れてくる情報を拾う",
          sub: "SNSのタイムラインや、友達からのシェア経由でニュースに出会うことが多い"
        }
      ]
    },
    {
      text: "Q2. あなたがよく見るニュースのジャンルは？",
      answers: [
        {
          title: "かなり幅広い",
          sub: "政治経済からエンタメ、スポーツまで、いろいろなジャンルを横断してチェックする"
        },
        {
          title: "関心分野が中心",
          sub: "好きなアイドルや趣味、特定の社会問題など、自分の関心事に寄っている"
        }
      ]
    },
    {
      text: "Q3. 衝撃的なニュースを見たとき、最後に残る反応は？",
      answers: [
        {
          title: "まず事実関係が気になる",
          sub: "これは本当か、他のメディアではどう報じているかを確認したくなる"
        },
        {
          title: "まず感情が大きく動く",

    "22111": {name: "🦘 専門分野の解説者・カンガルー", description: "人から聞いた特定分野の情報を、自分なりに分析して分かりやすく発信。面倒見がよく、後輩から頼りにされる存在です。"},
    "22112": {name: "🐇 オタ友と語り合うウサギ", description: "信頼する仲間から得た推しの情報を、さらに分析して語り合うのが大好き。寂しがり屋だけど、好きなことへの熱量は本物です。"},

    "22211": {name: "🕊️ 愛を叫ぶ伝書鳩", description: "仲間から聞いた推しの尊さを、感情のままに世界へ発信する愛の伝道師。『好き』を共有できることに喜びを感じます。"},
    "22212": {name: "🦝 井戸端会議のリーダー・アライグマ", description: "仲間内で共有された情報を元に、ワイワイおしゃべりするのが大好き。コミュニティを盛り上げる中心人物です。"},
    "22221": {name: "🦦 マイペースな夢見るラッコ", description: "好きな情報だけを、好きなときに、好きなだけ楽しむ自由人。自分の心地よい世界で、幸せに暮らしています。"},
    "22222": {name: "シーラカンス", description: "ごく限られた情報源からしか情報を受け取らず、自分の世界に深く閉じこもる孤高の存在。外界の喧騒には興味がありません。"}
  };

  const defaultType = {
    name: "❓ ミステリアスな存在",
    description: "あなたは規格外のユニークな存在です！"
  };

  const ARTICLE_BY_CATEGORY = {
    balanced: {
      title: "複数の情報源を見比べるときに意識したい、ニュースの読み方入門",
      url: "https://www.asahi.com/",
      note: "幅広く情報を見たい人向け。読み比べのコツを意識すると、判断の質が上がりやすくなります。"
    },
    social: {
      title: "SNS時代に流れてくる情報と上手につきあうためのヒント",
      url: "https://www.asahi.com/",
      note: "流れてくる情報を拾うのが得意な人向け。早さだけでなく、確からしさも押さえるのがコツです。"
    },
    focused: {
      title: "好きなテーマを深掘りするときの、偏りを減らす情報収集術",
      url: "https://www.asahi.com/",
      note: "関心分野を深く追う人向け。専門性を保ちつつ、視野を広げる工夫が役立ちます。"
    },
    emotional: {
      title: "強い感情を動かされたニュースに出会ったときの立ち止まり方",
      url: "https://www.asahi.com/",
      note: "共感力や反応の速さが強みの人向け。一呼吸おいて確認する習慣が効きます。"
    }
  };

  let currentQuestionIndex = 0;
  let selectedAnswers = [];

  const quizDiv = document.getElementById("quiz");
  const resultArea = document.getElementById("resultArea");
  const resultCard = document.getElementById("resultCard");
  const adviceList = document.getElementById("adviceList");
  const articleLink = document.getElementById("articleLink");
  const articleTitle = document.getElementById("articleTitle");
  const articleNote = document.getElementById("articleNote");
  const shareXBtn = document.getElementById("shareXBtn");
  const copyResultBtn = document.getElementById("copyResultBtn");
  const restartBtn = document.getElementById("restartBtn");

  function getAnswerValue(index) {
    return selectedAnswers[index] || null;
  }

  function getEmojiFromName(name) {
    const match = name.match(/^(\p{Emoji_Presentation}|\p{Extended_Pictographic})/u);
    return match ? match[0] : "🧭";
  }

  function getPlainName(name) {
    return name.replace(/^(\p{Emoji_Presentation}|\p{Extended_Pictographic})\s*/u, "");
  }

  function getTagSummary() {
    const q1 = getAnswerValue(0);
    const q2 = getAnswerValue(1);
    const q3 = getAnswerValue(2);
    const q4 = getAnswerValue(3);
    const q5 = getAnswerValue(4);

    return [
      q1 === "1" ? "自走型の情報収集" : "流入型の情報接触",
      q2 === "1" ? "ジャンル横断" : "関心テーマ集中",
      q3 === "1" ? "検証志向" : "共感反応型",
      q4 === "1" ? "共有アクティブ" : "内省型",
      q5 === "1" ? "比較判断派" : "信頼源重視"
    ];
  }

  function buildAdvice() {
    const q1 = getAnswerValue(0);
    const q2 = getAnswerValue(1);
    const q3 = getAnswerValue(2);
    const q4 = getAnswerValue(3);
    const q5 = getAnswerValue(4);

    const tips = [];

    if (q1 === "2") {
      tips.push("SNSやシェア経由で情報に出会いやすいタイプです。気になった話題ほど、元の発信源や一次情報を1回だけでも確認する習慣をつけると精度が上がります。");
    } else {
      tips.push("自分で情報を取りに行けるのが強みです。巡回先が固定化しやすいので、たまに違う立場や異なる媒体ものぞくと視野がさらに広がります。");
    }

    if (q2 === "2") {
      tips.push("関心分野への集中力が高いタイプです。好きなテーマの周辺分野も少しだけ触れると、推しや趣味のニュースの見え方がより立体的になります。");
    } else {
      tips.push("幅広く情報を追えるタイプです。量が多くなりやすいので、『毎日ここだけは見る』という軸媒体を決めると疲れにくくなります。");
    }

    if (q3 === "2") {
      tips.push("感情が先に動くのは自然なことです。驚いた話題ほど、シェアや判断の前に『日付』『出典』『他媒体の扱い』の3点だけ確認すると安心です。");
    } else {
      tips.push("事実確認をしようとする姿勢が大きな強みです。確認に時間をかけすぎて疲れたら、『この件は今は保留』と決めるのも大事です。");
    }

    if (q4 === "1") {
      tips.push("情報を人に届ける力があります。シェア前に短く一言『出典はここ』『まだ速報段階』のような注釈を添えると、さらに信頼されやすくなります。");
    } else {
      tips.push("自分の中で消化できる落ち着きがあります。たまに『これは誰かに共有する価値があるか』と考えると、良い情報の循環が生まれます。");
    }

    if (q5 === "2") {
      tips.push("信頼できる情報源を持つのは強みです。ただし、重要なテーマほど1つだけに頼らず、違う角度の説明を1本だけ足すと判断の偏りを減らせます。");
    } else {
      tips.push("比較しながら考える姿勢が健全です。毎回すべてを見比べるのは大変なので、『重い話題だけ複数確認』など自分ルールを作ると続けやすいです。");
    }

    return tips;
  }

  function getArticleData() {
    const q1 = getAnswerValue(0);
    const q2 = getAnswerValue(1);
    const q3 = getAnswerValue(2);
    const q5 = getAnswerValue(4);

    if (q3 === "2") return ARTICLE_BY_CATEGORY.emotional;
    if (q2 === "2") return ARTICLE_BY_CATEGORY.focused;
    if (q1 === "2") return ARTICLE_BY_CATEGORY.social;
    if (q5 === "1") return ARTICLE_BY_CATEGORY.balanced;

    return ARTICLE_BY_CATEGORY.balanced;
  }

  function getShareText(result) {
    return `ニュース接触タイプ診断の結果は「${result.name}」でした！\n${result.description}\n#ニュース接触タイプ診断`;
  }

  function createProgressHTML() {
    const currentNumber = Math.min(currentQuestionIndex + 1, QUESTIONS.length);
    const progressPercent = (currentQuestionIndex / QUESTIONS.length) * 100;

    const stepPills = QUESTIONS.map((_, i) => {
      let cls = "step-pill";
      if (i < currentQuestionIndex) cls += " done";
      else if (i === currentQuestionIndex) cls += " active";
      return `<div class="${cls}" aria-hidden="true"></div>`;
    }).join("");

    return `
      <div class="progress-wrap">
        <div class="progress-top">
          <div class="progress-label">progress</div>
          <div class="progress-count">${currentNumber} / ${QUESTIONS.length}</div>
        </div>
        <div class="progress-steps">${stepPills}</div>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" style="width:${progressPercent}%"></div>
        </div>
      </div>
    `;
  }

  function renderCurrentQuestion() {
    resultArea.classList.add("hidden");

    if (currentQuestionIndex >= QUESTIONS.length) {
      showResult();
      return;
    }

    const q = QUESTIONS[currentQuestionIndex];

    const answersHTML = q.answers.map((ans, i) => `
      <button class="answer-btn" type="button" data-value="${i + 1}">
        <div class="answer-top">
          <span class="answer-num">${i + 1}</span>
          <div class="answer-title">${ans.title}</div>
        </div>
        <div class="answer-sub">${ans.sub}</div>
      </button>
    `).join("");

    quizDiv.innerHTML = `
      <div class="quiz-enter">
        ${createProgressHTML()}
        <div class="question-card">
          <div class="question-kicker">質問 ${currentQuestionIndex + 1}</div>
          <h2 class="question-title">${q.text}</h2>
          <div class="answers">${answersHTML}</div>
          <div class="nav-row">
            <button id="backBtn" class="btn btn-secondary" type="button" ${currentQuestionIndex === 0 ? "disabled" : ""}>戻る</button>
            <button class="btn btn-primary" type="button" disabled>選択して次へ</button>
          </div>
        </div>
      </div>
    `;

    quizDiv.querySelectorAll(".answer-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedAnswers[currentQuestionIndex] = String(btn.dataset.value);
        currentQuestionIndex += 1;
        renderCurrentQuestion();
      });
    });

    const backBtn = document.getElementById("backBtn");
    if (backBtn) {
      backBtn.addEventListener("click", () => {
        if (currentQuestionIndex > 0) {
          currentQuestionIndex -= 1;
          renderCurrentQuestion();
        }
      });
    }
  }

  function showResult() {
    const key = selectedAnswers.join("");
    const finalType = ANIMAL_TYPES[key] || defaultType;
    const emoji = getEmojiFromName(finalType.name);
    const plainName = getPlainName(finalType.name);
    const adviceItems = buildAdvice();
    const article = getArticleData();
    const metaChips = getTagSummary()
      .map((tag) => `<span class="meta-chip">${tag}</span>`)
      .join("");

    quizDiv.innerHTML = "";

    resultCard.innerHTML = `
      <div class="result-badge">✨ 診断完了</div>
      <div class="result-main">
        <div class="result-emoji-wrap">
          <div class="result-emoji" aria-hidden="true">${emoji}</div>
        </div>
        <div>
          <h3 class="result-name">${plainName}</h3>
          <p class="result-desc">${finalType.description}</p>
        </div>
      </div>
      <div class="result-meta">${metaChips}</div>
    `;
    resultCard.classList.remove("pop-in");
    void resultCard.offsetWidth;
    resultCard.classList.add("pop-in");

    adviceList.innerHTML = "";
    adviceItems.forEach((tip) => {
      const li = document.createElement("li");
      li.textContent = tip;
      adviceList.appendChild(li);
    });

    articleLink.href = article.url;
    articleTitle.textContent = article.title;
    articleNote.textContent = article.note;

    shareXBtn.onclick = () => {
      const shareText = getShareText(finalType);
      const shareUrl = window.location.href;
      const xUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
      window.open(xUrl, "_blank", "noopener,noreferrer");
    };

    copyResultBtn.onclick = async () => {
      const text = `${getShareText(finalType)}\n${window.location.href}`;
      try {
        await navigator.clipboard.writeText(text);
        const original = copyResultBtn.textContent;
        copyResultBtn.textContent = "コピーしました";
        copyResultBtn.disabled = true;
        setTimeout(() => {
          copyResultBtn.textContent = original;
          copyResultBtn.disabled = false;
        }, 1400);
      } catch (error) {
        alert("コピーに失敗しました。");
      }
    };

    resultArea.classList.remove("hidden");
    resultArea.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  restartBtn.addEventListener("click", () => {
    currentQuestionIndex = 0;
    selectedAnswers = [];
    resultArea.classList.add("hidden");
    renderCurrentQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  renderCurrentQuestion();
});
</script>
